<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Emoji Pack Builder</title>
  <link rel="icon" href="/static/favicon.ico" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/miniapp/style.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <main class="app">
    <header class="app__header">
      <div class="logo" aria-hidden="true">
        <svg class="brand-eye" viewBox="0 0 48 48" role="img" aria-label="logo" xmlns="http://www.w3.org/2000/svg">
          <path class="brand-eye__lid" d="M3 24C11 11 37 11 45 24C37 37 11 37 3 24Z" />
          <circle class="brand-eye__iris" cx="24" cy="24" r="9" />
          <circle class="brand-eye__pupil" cx="24" cy="24" r="4.2" />
          <circle class="brand-eye__glint" cx="27.5" cy="20.5" r="1.7" />
        </svg>
      </div>
      <div>
        <h1 class="app__title">Feel Free</h1>
      </div>
    </header>

    <!-- ВКЛАДКА: МЕНЮ (ИСТОРИЯ) -->
    <section class="view" data-view="history" hidden>
      <div class="view__head">
        <h2 class="view__title">История</h2>
        <button type="button" class="btn btn--ghost btn--sm" data-history-refresh>Обновить</button>
      </div>
      <div class="history" data-history></div>
    </section>

    <!-- ВКЛАДКА: СОЗДАТЬ -->
    <section class="view" data-view="create">

      <form class="card form" data-form novalidate>
        <div class="field">
          <span class="field__label">Изображение или видео</span>
          <div
            class="dropzone"
            data-dropzone
            tabindex="0"
            role="button"
            aria-label="Перетащите файл сюда или выберите вручную"
          >
            <input
              type="file"
              id="file-input"
              data-file
              accept=".jpg,.jpeg,.png,.webp,.gif,.mp4,.webm,.mov,image/*,video/*"
              hidden
            />
            <div class="dropzone__empty" data-dropzone-empty>
              <div class="dropzone__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M4 20h16"/>
                </svg>
              </div>
              <p class="dropzone__title" data-dz-desktop-only>Перетащите файл сюда</p>
              <p class="dropzone__hint">JPG · PNG · WEBP · GIF · MP4 · WEBM · MOV · до 50 МБ</p>
              <label for="file-input" class="btn btn--primary dropzone__cta">Выбрать файл</label>
            </div>
            <div class="dropzone__preview" data-preview hidden>
              <div class="preview__media" data-preview-media>
                <span class="preview__name" data-file-name></span>
              </div>
              <button type="button" class="btn btn--ghost btn--sm" data-clear>Заменить файл</button>
            </div>
          </div>
        </div>

        <div class="form__config" data-config hidden>
          <div class="field">
            <label class="field__label" for="pack-title">Название пака</label>
            <input
              id="pack-title"
              class="input"
              type="text"
              data-title
              maxlength="64"
              placeholder="Например, fastlife"
              autocomplete="off"
              enterkeyhint="done"
            />
          </div>
          <div class="add-banner" data-addbanner hidden>
            <span>➕ Добавляем эмодзи в пак: <b data-addbanner-name></b> · имя пака не меняется</span>
            <button type="button" class="link-btn" data-addbanner-cancel>Отменить</button>
          </div>

          <div class="field">
            <span class="field__label">Ориентация</span>
            <div class="pills" data-orientation-group></div>
          </div>

          <div class="field">
            <span class="field__label">Сетка</span>
            <div class="pills" data-grid-group></div>
          </div>

          <button type="submit" class="btn btn--primary btn--block" data-submit disabled>Создать пак</button>
        </div>
      </form>

      <section class="card status" data-status hidden></section>
      <section class="card result" data-result hidden></section>
    </section>

    <!-- ВКЛАДКА: НАСТРОЙКИ -->
    <section class="view" data-view="settings" hidden>
      <h2 class="view__title">Настройки</h2>
      <section class="card">
        <div class="field">
          <span class="field__label">Тема</span>
          <div class="pills" data-theme-group>
            <button type="button" class="pill" data-theme-value="auto">Авто</button>
            <button type="button" class="pill" data-theme-value="light">Светлая</button>
            <button type="button" class="pill" data-theme-value="dark">Тёмная</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <nav class="tabbar">
    <button type="button" class="tabbar__btn is-active" data-tab="create">
      <span class="tabbar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </span>
      <span class="tabbar__label">Создать</span>
    </button>
    <button type="button" class="tabbar__btn" data-tab="history">
      <span class="tabbar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7.5" height="7.5" rx="1.8"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.8"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.8"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.8"/></svg>
      </span>
      <span class="tabbar__label">Меню</span>
    </button>
    <button type="button" class="tabbar__btn" data-tab="settings">
      <span class="tabbar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 7h9M17 7h3M4 12h3M11 12h9M4 17h6M14 17h6"/><circle cx="15" cy="7" r="2.1"/><circle cx="9" cy="12" r="2.1"/><circle cx="12" cy="17" r="2.1"/></svg>
      </span>
      <span class="tabbar__label">Настройки</span>
    </button>
  </nav>

  <script src="/static/miniapp/app.js"></script>
</body>
</html>
